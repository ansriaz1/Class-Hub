<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ultimate AI Classroom Whiteboard</title>

<style>
body{margin:0;font-family:Arial;background:#eef1f5}
#toolbar{background:#020617;color:white;padding:8px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
button,input{padding:6px;border-radius:4px;border:none}
button{cursor:pointer}
#board{display:block;background:white}
#pageIndicator{color:white}
</style>

<!-- Firebase for collaboration -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<!-- Math -->
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

</head>
<body>

<div id="toolbar">

<button onclick="setTool('pen')">Pen</button>
<button onclick="setTool('eraser')">Eraser</button>
<button onclick="setTool('line')">Line</button>
<button onclick="setTool('rect')">Rectangle</button>
<button onclick="setTool('circle')">Circle</button>

<button onclick="undo()">Undo</button>
<button onclick="redo()">Redo</button>
<button onclick="clearBoard()">Clear</button>

<button onclick="saveImage()">Save</button>
<button onclick="exportPDF()">Export</button>

<button onclick="startRecording()">Start Rec</button>
<button onclick="stopRecording()">Stop Rec</button>

<button onclick="startVoice()">Voice Rec</button>

<button onclick="shareScreen()">Share Screen</button>

<button onclick="plotGraph()">Plot Graph</button>

<button onclick="newPage()">New Page</button>
<button onclick="prevPage()">Prev</button>
<button onclick="nextPage()">Next</button>
<span id="pageIndicator">Page 1</span>

<label>Color <input type="color" id="color" value="#000000"></label>
<label>Size <input type="range" id="size" min="1" max="30" value="3"></label>

<input id="textInput" placeholder="Text" />
<button onclick="enableText()">Place</button>

<input id="mathInput" placeholder="LaTeX math" />
<button onclick="addMath()">Math</button>

<button onclick="startAIRecognition()">AI Handwriting → Text</button>

<select id="role">
<option value="teacher">Teacher</option>
<option value="student">Student</option>
</select>

<input id="classId" placeholder="Class ID" />
<button onclick="createClass()">Create Class</button>
<button onclick="joinClass()">Join Class</button>

</div>

<canvas id="board"></canvas>

<script>

const canvas=document.getElementById("board")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight-70
}
resize()
window.addEventListener("resize",resize)

let drawing=false
let tool="pen"
let lastX=0
let lastY=0

let history=[]
let redoStack=[]

let pages=[null]
let currentPage=0

function updatePage(){
document.getElementById("pageIndicator").innerText="Page "+(currentPage+1)
}

function smoothLine(x,y){
ctx.quadraticCurveTo(lastX,lastY,(x+lastX)/2,(y+lastY)/2)
ctx.stroke()
lastX=x
lastY=y
}

function saveState(){
history.push(canvas.toDataURL())
localStorage.setItem("autosave",canvas.toDataURL())
}

function undo(){
if(history.length==0) return
redoStack.push(canvas.toDataURL())
let img=new Image()
img.src=history.pop()
img.onload=()=>ctx.drawImage(img,0,0)
}

function redo(){
if(redoStack.length==0) return
history.push(canvas.toDataURL())
let img=new Image()
img.src=redoStack.pop()
img.onload=()=>ctx.drawImage(img,0,0)
}

function setTool(t){tool=t}

canvas.addEventListener("mousedown",startDraw)
canvas.addEventListener("mouseup",()=>drawing=false)
canvas.addEventListener("mousemove",draw)

function pos(e){return {x:e.clientX,y:e.clientY}}

function startDraw(e){
let p=pos(e)
lastX=p.x
lastY=p.y
ctx.beginPath()
ctx.moveTo(p.x,p.y)
drawing=true
saveState()
}

function draw(e){
if(!drawing) return

let p=pos(e)
ctx.lineWidth=document.getElementById("size").value
ctx.lineCap="round"

if(tool=="eraser") ctx.strokeStyle="white"
else ctx.strokeStyle=document.getElementById("color").value

smoothLine(p.x,p.y)

broadcastDraw(p.x,p.y)
}

function clearBoard(){ctx.clearRect(0,0,canvas.width,canvas.height)}

function saveImage(){
let a=document.createElement("a")
a.href=canvas.toDataURL()
a.download="whiteboard.png"
a.click()
}

function exportPDF(){
let img=canvas.toDataURL()
let w=window.open()
w.document.write('<img src="'+img+'"/>')
}

let textMode=false

function enableText(){textMode=true}

canvas.addEventListener("click",e=>{
if(!textMode) return
ctx.fillStyle=document.getElementById("color").value
ctx.font="22px Arial"
ctx.fillText(document.getElementById("textInput").value,e.clientX,e.clientY)
textMode=false
})

function addMath(){
let eq=document.getElementById("mathInput").value
let div=document.createElement("div")
div.innerHTML="\\("+eq+"\\)"
div.style.position="absolute"
div.style.left="20px"
div.style.top="90px"
document.body.appendChild(div)
MathJax.typeset()
}

function startAIRecognition(){
alert("Connect AI model (OpenAI / TensorFlow) for handwriting recognition.")
}

function plotGraph(){
ctx.beginPath()
for(let x=0;x<canvas.width;x++){
let y=200+100*Math.sin(x*0.02)
if(x==0) ctx.moveTo(x,y)
else ctx.lineTo(x,y)
}
ctx.stroke()
}

function shareScreen(){
navigator.mediaDevices.getDisplayMedia().then(stream=>{
let video=document.createElement("video")
video.srcObject=stream
video.play()
video.style.position="absolute"
video.style.width="300px"
video.style.bottom="10px"
document.body.appendChild(video)
})
}

/* voice recording */
function startVoice(){
navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
let rec=new MediaRecorder(stream)
let data=[]
rec.ondataavailable=e=>data.push(e.data)
rec.onstop=()=>{
let blob=new Blob(data)
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="voice.webm"
a.click()
}
rec.start()
setTimeout(()=>rec.stop(),10000)
})
}

/* lecture recording */
let mediaRecorder
let chunks=[]

function startRecording(){
let stream=canvas.captureStream(30)
mediaRecorder=new MediaRecorder(stream)
mediaRecorder.ondataavailable=e=>chunks.push(e.data)
mediaRecorder.onstop=e=>{
let blob=new Blob(chunks)
let url=URL.createObjectURL(blob)
let a=document.createElement("a")
a.href=url
a.download="lecture.webm"
a.click()
}
mediaRecorder.start()
}

function stopRecording(){if(mediaRecorder) mediaRecorder.stop()}

function newPage(){
pages[currentPage]=canvas.toDataURL()
pages.push(null)
currentPage++
ctx.clearRect(0,0,canvas.width,canvas.height)
updatePage()
}

function prevPage(){
if(currentPage==0) return
pages[currentPage]=canvas.toDataURL()
currentPage--
loadPage()
}

function nextPage(){
if(currentPage>=pages.length-1) return
pages[currentPage]=canvas.toDataURL()
currentPage++
loadPage()
}

function loadPage(){
ctx.clearRect(0,0,canvas.width,canvas.height)
if(pages[currentPage]){
let img=new Image()
img.src=pages[currentPage]
img.onload=()=>ctx.drawImage(img,0,0)
}
updatePage()
}

window.onload=()=>{
updatePage()
let saved=localStorage.getItem("autosave")
if(saved){
let img=new Image()
img.src=saved
img.onload=()=>ctx.drawImage(img,0,0)
}
}

/* Live classroom */

const firebaseConfig={
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
databaseURL:"YOUR_DB_URL",
projectId:"YOUR_PROJECT"
}

firebase.initializeApp(firebaseConfig)
const db=firebase.database()

let classRef=null

function createClass(){
let id=Math.random().toString(36).substring(2,7)
document.getElementById("classId").value=id
classRef=db.ref("classes/"+id)
listenClass()
alert("Class created: "+id)
}

function joinClass(){
let id=document.getElementById("classId").value
classRef=db.ref("classes/"+id)
listenClass()
alert("Joined class")
}

function broadcastDraw(x,y){
if(!classRef) return
classRef.push({x:x,y:y,color:ctx.strokeStyle,size:ctx.lineWidth})
}

function listenClass(){
classRef.on("child_added",snap=>{
let d=snap.val()
ctx.strokeStyle=d.color
ctx.lineWidth=d.size
ctx.lineTo(d.x,d.y)
ctx.stroke()
ctx.beginPath()
ctx.moveTo(d.x,d.y)
})
}

</script>

</body>
  </html>
